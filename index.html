<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baillieu Architects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, Times New Roman, serif; background-color: #f5f5f5; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #1a2344; padding: 24px 0; text-align: center; }
        header h1 { color: #ffffff; font-size: 28px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
        .content { max-width: 600px; text-align: center; }
        .content p { font-size: 18px; line-height: 1.8; color: #555; margin-bottom: 16px; }
        .divider { width: 60px; height: 2px; background-color: #1a2344; margin: 32px auto; }
        footer { background-color: #1a2344; padding: 16px 0; text-align: center; }
        footer p { color: #8a92a8; font-size: 13px; }
    </style>
</head>
<body>
    <header><h1>Baillieu Architects</h1></header>
    <main><div class="content"><p>Baillieu Architects is no longer taking on new client projects.</p><div class="divider"></div><p>We thank all of our clients and collaborators for their support over the years.</p></div></main>
    <footer><p>&copy; Sarah Baillieu Architects Limited</p></footer>
</body>
</html>
